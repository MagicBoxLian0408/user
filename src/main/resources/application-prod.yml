spring:
  application:
    name: user-prod
  jackson:
    property-naming-strategy: SNAKE_CASE
  grpc:
    client:
      channels:
        review:
          address: ${REVIEW_SERVICE_URL}
          negotiation-type: plaintext
          keep-alive-time: 30s
          keep-alive-timeout: 5s

  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    listener:
      ack-mode: record
      missing-topics-fatal: true
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: "kr.magicbox.user.adapter.in.kafka.event"
        spring.json.type.mapping: user-logged-in:kr.magicbox.user.adapter.in.kafka.event.LoginEvent,user-logged-out:kr.magicbox.user.adapter.in.kafka.event.LogoutEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    retry:
      topic:
        backoff:
          multiplier: 2
          delay: 1s
        attempts: 5

security:
  trusted:
    ips:
      - ${TRUSTED_IP_GATEWAY}

resilience4j:
  circuitbreaker:
    instances:
      reviewService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
  timelimiter:
    instances:
      reviewService:
        timeout-duration: 2s

user:
  default-profile-image-url: ${USER_PROFILE_DEFAULT_IMAGE_URL}

inbox:
  max-event-age-minutes: 60
